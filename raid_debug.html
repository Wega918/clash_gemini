<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raid System Debug</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1a1a1a;
      color: #0f0;
    }
    .log {
      background: #000;
      padding: 10px;
      border: 1px solid #0f0;
      margin: 10px 0;
      max-height: 400px;
      overflow-y: auto;
    }
    .error { color: #f00; }
    .success { color: #0f0; }
    .warning { color: #ff0; }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🎮 Raid System Debug Console</h1>
  
  <div>
    <button onclick="testModules()">1. Test Modules</button>
    <button onclick="testAPI()">2. Test API</button>
    <button onclick="testCanvas()">3. Test Canvas</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>
  
  <div class="log" id="log"></div>
  
  <canvas id="test-canvas" width="784" height="440" style="border: 1px solid #0f0; margin-top: 20px;"></canvas>
  
  <!-- Load all raid modules -->
  <script src="/js/raid_new/RaidApi.js"></script>
  <script src="/js/raid_new/RaidSearchManager.js"></script>
  <script src="/js/raid_new/ScoutScene.js"></script>
  <script src="/js/raid_new/BattleScene.js"></script>
  <script src="/js/raid_new/RaidApp.js"></script>
  
  <script>
    function log(msg, type = 'info') {
      const div = document.getElementById('log');
      const span = document.createElement('div');
      span.className = type;
      span.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      div.appendChild(span);
      div.scrollTop = div.scrollHeight;
      console.log(msg);
    }
    
    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }
    
    function testModules() {
      log('Testing modules loading...', 'warning');
      
      const modules = {
        'RaidApi': window.RaidApi,
        'RaidApp': window.RaidApp,
        'RaidSearchManager': window.RaidSearchManager,
        'ScoutScene': window.ScoutScene,
        'BattleScene': window.BattleScene
      };
      
      let allLoaded = true;
      for (const [name, mod] of Object.entries(modules)) {
        if (mod) {
          log(`✅ ${name} loaded`, 'success');
        } else {
          log(`❌ ${name} NOT loaded`, 'error');
          allLoaded = false;
        }
      }
      
      if (allLoaded) {
        log('✅ All modules loaded successfully!', 'success');
      } else {
        log('❌ Some modules failed to load', 'error');
      }
    }
    
    async function testAPI() {
      log('Testing API connection...', 'warning');
      
      try {
        log('Calling bootstrap endpoint...');
        const data = await window.RaidApi.bootstrap();
        log('✅ Bootstrap response:', 'success');
        log(JSON.stringify(data, null, 2), 'success');
        
        if (data.army) {
          log(`Army: ${data.army.troops?.length || 0} troops, ${data.army.heroes?.length || 0} heroes, ${data.army.spells?.length || 0} spells`, 'success');
        }
      } catch (error) {
        log(`❌ API Error: ${error.message}`, 'error');
        log(error.stack, 'error');
      }
    }
    
    function testCanvas() {
      log('Testing Canvas rendering...', 'warning');
      
      const canvas = document.getElementById('test-canvas');
      if (!canvas) {
        log('❌ Canvas not found', 'error');
        return;
      }
      
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        log('❌ Cannot get 2D context', 'error');
        return;
      }
      
      log('✅ Canvas ready', 'success');
      
      try {
        log('Testing RaidSearchManager...');
        const searchMgr = new window.RaidSearchManager(canvas, ctx);
        searchMgr.startSearch();
        
        log('✅ RaidSearchManager created', 'success');
        log('Starting render loop...');
        
        let frame = 0;
        function render() {
          searchMgr.render(Date.now() / 1000);
          frame++;
          
          if (frame < 180) {
            requestAnimationFrame(render);
          } else {
            log('✅ Render test complete (180 frames)', 'success');
          }
        }
        
        requestAnimationFrame(render);
        
      } catch (error) {
        log(`❌ Canvas error: ${error.message}`, 'error');
        log(error.stack, 'error');
      }
    }
    
    // Auto-test on load
    window.addEventListener('load', () => {
      log('🎮 Raid System Debug Console Ready', 'success');
      setTimeout(() => {
        testModules();
      }, 500);
    });
  </script>
</body>
</html>
